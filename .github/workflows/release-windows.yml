name: Release Windows App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: |
          npm run test
          npm run typecheck
          npm run lint

      - name: Build Windows installer and portable app
        run: npm run dist:win

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kimi-gui-windows-${{ github.ref_name }}
          path: |
            release/Kimi-GUI-Setup-*.exe
            release/Kimi-GUI-Portable-*.exe
            release/*.blockmap
          if-no-files-found: error

      - name: Create GitHub Release if needed
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:GITHUB_REF_NAME --title $env:GITHUB_REF_NAME --generate-notes
          }

      - name: Attach files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload $env:GITHUB_REF_NAME release/Kimi-GUI-Setup-*.exe release/Kimi-GUI-Portable-*.exe release/*.blockmap --clobber