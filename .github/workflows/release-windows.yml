name: Release Windows App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本标签，例如 v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Run type checks
        run: npm run typecheck

      - name: Run lint checks
        run: npm run lint

      - name: Build Windows installer and portable app
        run: npm run dist:win

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kimi-gui-windows-${{ inputs.version }}
          path: |
            release/Kimi-GUI-Setup-*.exe
            release/Kimi-GUI-Portable-*.exe
            release/*.blockmap
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --target $env:GITHUB_SHA --title "Kimi GUI $env:RELEASE_TAG" --generate-notes
          }
          gh release upload $env:RELEASE_TAG release/Kimi-GUI-Setup-*.exe release/Kimi-GUI-Portable-*.exe release/*.blockmap --clobber
