name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Run type checks
        run: npm run typecheck

      - name: Run lint checks
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run publish safety audit
        run: npm run audit:publish

      - name: Audit dependencies
        run: npm audit --audit-level=high
